<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You ❤️</title>
    <link rel="stylesheet" href="css/flower.css" />
</head>
<body>
    <div id="thankyou"><b>Thank you for being my wife</b></div>
    
    <div class="flower">
        <div class="f-wrapper">
            <div class="flower__line"></div>
            <div class="f">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__leaf flower__leaf--6"></div>
                <div class="flower__leaf flower__leaf--7"></div>
                <div class="flower__leaf flower__leaf--8 flower__fall-down--yellow"></div>
            </div>
        </div>

        <div class="f-wrapper f-wrapper--2">
            <div class="flower__line"></div>
            <div class="f">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__leaf flower__leaf--6"></div>
                <div class="flower__leaf flower__leaf--7"></div>
                <div class="flower__leaf flower__leaf--8 flower__fall-down--pink"></div>
            </div>
        </div>

        <div class="f-wrapper f-wrapper--3">
            <div class="flower__line"></div>
            <div class="f">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__leaf flower__leaf--6"></div>
                <div class="flower__leaf flower__leaf--7"></div>
                <div class="flower__leaf flower__leaf--8 flower__fall-down--purple"></div>
            </div>
        </div>
        <div class="flower__glass"></div>
    </div>

    <!-- Audio element with fallback for mobile browsers -->
    <audio id="bgMusic" loop preload="auto">
        <source src="dobroutro.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Wait for the page to load
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('bgMusic');
            
            // Try to play automatically (may be blocked by browsers)
            audio.play().catch(function(error) {
                console.log('Auto-play was prevented. Click anywhere to play music.');
            });
            
            // Add click handler for mobile devices that block autoplay
            document.addEventListener('click', function initAudio() {
                const audio = document.getElementById('bgMusic');
                if (audio && audio.paused) {
                    audio.play().catch(e => {
                        console.log('Still unable to play audio:', e);
                    });
                }
            }, { once: true });
        });
    </script>
</body>
</html>
